services:
  postgres:
    image: postgres:12.2-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"

  nakama:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.22.0
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address postgres:localdb@postgres/nakama &&
        exec /nakama/nakama --name nakama1
        --database.address postgres:localdb@postgres/nakama
        --logger.level DEBUG
        --runtime.path /backend/src
        --runtime.js_entrypoint index.js
        --socket.server_key defaultkey
        --console.username admin
        --console.password password
        --session.token_expiry_sec 3600
        --socket.outgoing_queue_size 64
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    volumes:
      - ./backend:/backend
    depends_on:
      - postgres
    restart: unless-stopped